[build]
  publish = "."

[[redirects]]
  from = "/why-now"
  to = "/why-now.html"
  status = 200

[[redirects]]
  from = "/why-now/"
  to = "/why-now.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
